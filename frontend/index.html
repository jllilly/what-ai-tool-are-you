<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>What AI Tool Are You?</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- INTRO SCREEN -->
    <div id="intro">
        <h1>🤖 What AI Tool Are You?</h1>
        <p>A personality quiz for recruiters. Answer 5 questions and find out which AI tool is your spirit animal.</p>
        <button onclick="startQuiz()">Let's Find Out →</button>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quiz" class="hidden">
        <div id="question-container">
            <p id="question-number"></p>
            <h2 id="question-text"></h2>
            <div id="answers"></div>
        </div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result" class="hidden">
        <div id="result-card">
            <h2 id="result-emoji"></h2>
            <h1 id="result-title"></h1>
            <p id="result-description"></p>
            <button onclick="restartQuiz()">Take It Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
